<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lady Chrome — dither</title>
<style>
  :root{--bg:#000;}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;}
  body{display:flex;align-items:center;justify-content:center;position:relative;}
  body::before{content:"";position:absolute;width:64vmin;height:64vmin;border-radius:50%;
    background:radial-gradient(circle,rgba(200,215,255,.26) 0%,rgba(150,165,225,.14) 42%,rgba(0,0,0,0) 72%);
    filter:blur(20px);animation:halo 5s ease-in-out infinite;pointer-events:none;}
  @keyframes halo{0%,100%{opacity:.6;transform:scale(.96);}50%{opacity:1;transform:scale(1.05);}}
  #c{display:block;touch-action:manipulation;position:relative;
    filter:drop-shadow(0 0 6px rgba(190,205,255,.35));animation:breathe 5s ease-in-out infinite;}
  @keyframes breathe{0%,100%{filter:drop-shadow(0 0 6px rgba(190,205,255,.30)) brightness(1);}
    50%{filter:drop-shadow(0 0 16px rgba(190,205,255,.55)) brightness(1.12);}}}
</style></head>
<body>
  <canvas id="c"></canvas>
<script>
(function(){
  // 8x8 Bayer ordered-dither matrix (normalized), same as wa-di
  var BAYER=[0,32,8,40,2,34,10,42,48,16,56,24,50,18,58,26,12,44,4,36,14,46,6,38,
             60,28,52,20,62,30,54,22,3,35,11,43,1,33,9,41,51,19,59,27,49,17,57,25,
             15,47,7,39,13,45,5,37,63,31,55,23,61,29,53,21].map(function(v){return v/64;});

  var canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  var COLS=320, FILL=0.86, DOT=0.85, SHARP=0.85, FLOOR=0.10, BG=247;
  var COLOR=[232,237,247], ACCENT=[150,180,255];            // silver -> cool
  // shockwave / repel tuning (ported from wa-di)
  var SW_SPEED=225, SW_WIDTH=37, SW_STR=20, SW_DUR=675, REPEL_R=110, REPEL_STR=42;

  var img=new Image(), S=null, dpr=Math.min(window.devicePixelRatio||1,2);

  function build(){
    var vw=window.innerWidth, vh=window.innerHeight;
    canvas.style.width=vw+'px'; canvas.style.height=vh+'px';
    canvas.width=vw*dpr; canvas.height=vh*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);

    // sample the image luminance into a COLS x ROWS grid
    var ar=img.naturalHeight/img.naturalWidth, ROWS=Math.round(COLS*ar);
    var off=document.createElement('canvas'); off.width=COLS; off.height=ROWS;
    var octx=off.getContext('2d'); octx.drawImage(img,0,0,COLS,ROWS);
    var data=octx.getImageData(0,0,COLS,ROWS).data;

    // fit grid into viewport
    var d=Math.min(vw/COLS, vh/ROWS)*FILL;
    var ox=(vw-COLS*d)/2, oy=(vh-ROWS*d)/2;

    var bx=[],by=[],br=[],tn=[];
    for(var y=0;y<ROWS;y++)for(var x=0;x<COLS;x++){
      var L=data[(y*COLS+x)*4];                 // grayscale -> R==G==B
      if(L>=BG) continue;                        // white backdrop -> no dot (keeps shape on black)
      var raw=L/255;                             // bright chrome -> bright dot
      var bay=BAYER[(y&7)*8+(x&7)];
      var dith=raw>bay?1:0;
      var o=raw*(1-SHARP)+dith*SHARP;
      bx.push(ox+x*d); by.push(oy+y*d);
      br.push(FLOOR+(1-FLOOR)*o);
      tn.push(x/(COLS-1));
    }
    var n=bx.length;
    S={n:n,d:d,
       baseX:Float32Array.from(bx), baseY:Float32Array.from(by),
       bright:Float32Array.from(br), tint:Float32Array.from(tn),
       dispX:new Float32Array(n), dispY:new Float32Array(n),
       renderX:Float32Array.from(bx), renderY:Float32Array.from(by),
       size:d*DOT,
       mouseX:-1e4, mouseY:-1e4, mouseActive:false, shocks:[], anim:false, hasDisp:false};
  }

  function draw(){
    var s=S; if(!s) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // bucket by brightness(21) x tint(6) for batched fills
    var buckets={};
    for(var i=0;i<s.n;i++){
      var b=s.bright[i]; if(b<0.02) continue;
      var key=Math.round(b*20)*6+Math.round(s.tint[i]*5);
      (buckets[key]||(buckets[key]=[])).push(i);
    }
    for(var key in buckets){
      var arr=buckets[key], a=Math.floor(key/6)/20, t=(key%6)/5;
      var r=Math.round(COLOR[0]+(ACCENT[0]-COLOR[0])*t);
      var g=Math.round(COLOR[1]+(ACCENT[1]-COLOR[1])*t);
      var bl=Math.round(COLOR[2]+(ACCENT[2]-COLOR[2])*t);
      ctx.fillStyle='rgba('+r+','+g+','+bl+','+a+')';
      var p=new Path2D(), sz=s.size;
      for(var j=0;j<arr.length;j++){var k=arr[j];p.rect(s.renderX[k]-.25,s.renderY[k]-.25,sz+.5,sz+.5);}
      ctx.fill(p);
    }
  }

  var raf=null;
  function frame(now){
    var s=S; if(!s){raf=null;return;}
    s.anim=false;
    s.shocks=s.shocks.filter(function(w){return now-w.start<SW_DUR;});
    var active=s.mouseActive||s.shocks.length>0||s.hasDisp;
    if(active){
      var mr=1+(s.shocks.length-1)*.5; if(s.shocks.length) s.anim=true;
      s.hasDisp=false;
      for(var i=0;i<s.n;i++){
        var bx=s.baseX[i], by=s.baseY[i], tx=0, ty=0;
        if(s.mouseActive){
          var dx=bx+s.dispX[i]-s.mouseX, dy=by+s.dispY[i]-s.mouseY, q=dx*dx+dy*dy;
          if(q<REPEL_R*REPEL_R && q>.1){var e=Math.sqrt(q), f=1-e/REPEL_R; var a=f*f*f*REPEL_STR; tx=dx/e*a; ty=dy/e*a;}
        }
        for(var w=0;w<s.shocks.length;w++){
          var sw=s.shocks[w], age=now-sw.start, ring=age/1000*SW_SPEED, decay=1-age/SW_DUR;
          var ddx=bx-sw.x, ddy=by-sw.y, m=Math.sqrt(ddx*ddx+ddy*ddy); if(m<.1) continue;
          var off=Math.abs(m-ring);
          if(off<SW_WIDTH){var e2=(1-off/SW_WIDTH)*decay*SW_STR*mr; tx+=ddx/m*e2; ty+=ddy/m*e2;}
        }
        s.dispX[i]+=(tx-s.dispX[i])*.12; s.dispY[i]+=(ty-s.dispY[i])*.12;
        if(Math.abs(s.dispX[i])<.01)s.dispX[i]=0; if(Math.abs(s.dispY[i])<.01)s.dispY[i]=0;
        if(s.dispX[i]||s.dispY[i]){s.anim=true; s.hasDisp=true;}
        s.renderX[i]=bx+s.dispX[i]; s.renderY[i]=by+s.dispY[i];
      }
    }
    draw();
    raf=(s.mouseActive||s.anim)?requestAnimationFrame(frame):null;
  }
  function kick(){ if(!raf) raf=requestAnimationFrame(frame); }

  function pos(e){var r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
  canvas.addEventListener('pointermove',function(e){var s=S;if(!s)return;if(e.pointerType==='mouse'){var p=pos(e);s.mouseX=p.x;s.mouseY=p.y;s.mouseActive=true;kick();}});
  canvas.addEventListener('pointerleave',function(e){var s=S;if(s&&e.pointerType==='mouse'){s.mouseActive=false;kick();}});
  canvas.addEventListener('pointerdown',function(e){var s=S;if(!s)return;var p=pos(e);s.shocks.push({x:p.x,y:p.y,start:performance.now()});kick();});
  window.addEventListener('resize',function(){build();draw();kick();});

  img.onload=function(){build();draw();kick();};
